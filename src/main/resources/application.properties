# Configuracion para PostgreSQL
spring.application.name=apipedidos
server.port=8090

# Configuracion de conexion a PostgreSQL
# Nota: PostgreSQL no soporta 'createDatabaseIfNotExist=true' en la URL como MySQL/MariaDB
spring.datasource.url=jdbc:postgresql://localhost:5432/dbpedidos?currentSchema=public
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialecto especifico para las versiones modernas de PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret.key= 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration.time= 86400000


# Configuración de la documentación OpenAPI/Swagger
# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=com.menuadmin.apipedidos.controller
springdoc.paths-to-match=/**
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.doc-expansion=none

